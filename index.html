<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimarket Nofi & Siska</title>

    <!-- File CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>
            <marquee>SELAMAT DATANG DI MINIMARKET NOFI & SISKA</marquee>
        </h1>

        <!-- Daftar Produk -->
        <div id="product-list">

            <center>
                <h2>DAFTAR PRODUK</h2>
            </center>

            <div id="products" class="product-container"></div>

        </div>

        <!-- Keranjang Belanja -->
        <div id="cart">

            <h2>KERANJANG BELANJA</h2>

            <ul id="cart-items"></ul>

            <p>
                Total: Rp <span id="total-price">0</span>
            </p>

            <button id="checkout-btn">
                Checkout
            </button>

        </div>

    </div>

    <!-- File JavaScript -->
    <script src="script.js"></script>

</body>
</html>
